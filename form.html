<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Application — Senior Browser Automation Engineer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 40px;
      width: 100%;
      max-width: 680px;
      height: fit-content;
    }

    .logo { font-weight: 800; font-size: 1.5rem; color: #0057ff; margin-bottom: 4px; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: .9rem; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #333; margin-bottom: 6px; }

    input[type=text], input[type=email], input[type=tel], textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .95rem;
      font-family: inherit;
      color: #1a1a1a;
      transition: border-color .15s;
      outline: none;
    }
    input:focus, textarea:focus { border-color: #0057ff; }
    textarea { resize: vertical; line-height: 1.5; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    button[type=submit] {
      width: 100%;
      padding: 14px;
      background: #0057ff;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    button[type=submit]:hover { background: #0040cc; }

    /* Success state */
    #success {
      display: none;
      text-align: center;
      padding: 60px 0;
    }
    .check {
      width: 72px; height: 72px;
      background: #e6f2e6;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    #success h2 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 8px; }
    #success p  { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Career Portal</div>
    <h1>Senior Browser Automation Engineer</h1>
    <p class="subtitle">Engineering · Full-time</p>

    <form id="appForm">
      <div class="row">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@email.com" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="(787) 555-0100" />
        </div>
        <div class="field">
          <label for="linkedin">LinkedIn</label>
          <input type="text" id="linkedin" name="linkedin" placeholder="linkedin.com/in/yourname" />
        </div>
      </div>

      <div class="field">
        <label for="resume">Resume</label>
        <textarea id="resume" name="resume" rows="8" placeholder="Paste your resume text here…" required></textarea>
      </div>

      <div class="field">
        <label for="cover">Cover Letter</label>
        <textarea id="cover" name="cover" rows="8" placeholder="Tell us why you're the right fit…"></textarea>
      </div>

      <button type="submit" id="submitBtn">Submit Application</button>
    </form>

    <div id="success">
      <div class="check">✓</div>
      <h2>Application submitted!</h2>
      <p>Thanks for applying. Our team will review your application and be in touch soon.</p>
    </div>
  </div>

  <script>
    document.getElementById('appForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('appForm').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    });
  </script>
</body>
</html>

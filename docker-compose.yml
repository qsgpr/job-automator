services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./resume.txt:/app/resume.txt:ro
      - ./observability.db:/app/observability.db
      - ./reports:/app/reports
    environment:
      OLLAMA_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  ollama_models:
